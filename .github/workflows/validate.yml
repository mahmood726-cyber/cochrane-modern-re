name: validate-and-release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate:
    name: Full-corpus validation + dashboard artifact
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'

      - uses: r-lib/actions/setup-renv@v2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python package
        run: pip install -e ".[dev]"

      # The Pairwise70 .rda corpus and MetaAudit are not redistributable
      # from this repo. CI expects them to be provisioned via secrets
      # (for example, downloaded from a private artifact store).
      #
      # To enable CI replay:
      # 1. Upload the Pairwise70 corpus as a GitHub-releases asset on a
      #    private mirror repo.
      # 2. Add secrets.PAIRWISE70_URL + secrets.METAAUDIT_URL.
      # 3. Uncomment the provisioning block below.
      #
      # Until then, validate.yml runs only the smoke-fixture validation
      # as a sanity check.
      #
      # - name: Provision external data
      #   env:
      #     PAIRWISE70_URL: ${{ secrets.PAIRWISE70_URL }}
      #     METAAUDIT_URL: ${{ secrets.METAAUDIT_URL }}
      #   run: |
      #     curl -fsSL "$PAIRWISE70_URL" | tar -xzf - -C data/
      #     curl -fsSL "$METAAUDIT_URL" | tar -xzf - -C external/
      #     echo "PAIRWISE70_DIR=$PWD/data/Pairwise70/data" >> $GITHUB_ENV
      #     echo "METAAUDIT_DIR=$PWD/external/MetaAudit/metaaudit" >> $GITHUB_ENV

      - name: Run preflight (non-corpus tests only if data unavailable)
        run: |
          python -m pytest -v \
            tests/test_preflight.py \
            tests/test_contracts.py \
            tests/test_flip_classifier.py \
            tests/test_aggregator.py \
            tests/test_dashboard.py \
            -k "not integration" || echo "Preflight skipped — external data not provisioned."

      - name: Upload release artifact (docs + outputs)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: cochrane-modern-re-${{ github.ref_name }}
          path: |
            docs/
            paper/
            outputs/*.json
